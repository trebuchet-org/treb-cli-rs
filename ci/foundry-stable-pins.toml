# Alloy / dependency patches needed for specific foundry versions.
#
# The stable-pin workflow auto-discovers foundry targets (latest 2 minor
# stables + latest RC). This file provides [patch.crates-io] overrides
# for foundry versions that can't resolve deps cleanly.
#
# Format: [patches."<foundry-tag>"] with key = dependency override.
# Versions not listed here are assumed to need no patches.

[patches."v1.5.1"]
svm-rs-builds = { git = "https://github.com/alloy-rs/svm-rs", tag = "v0.5.24" }

# v1.5.0 needs the same patches as v1.5.1
[patches."v1.5.0"]
svm-rs-builds = { git = "https://github.com/alloy-rs/svm-rs", tag = "v0.5.24" }

# v1.4.x needs the same svm-rs pin
[patches."v1.4.4"]
svm-rs-builds = { git = "https://github.com/alloy-rs/svm-rs", tag = "v0.5.24" }
