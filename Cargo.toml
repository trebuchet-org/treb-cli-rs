[workspace]
members = ["crates/treb-cli", "crates/treb-core", "crates/treb-config", "crates/treb-registry", "crates/treb-forge"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["treb contributors"]
license = "MIT OR Apache-2.0"

[workspace.dependencies]
treb-core = { path = "crates/treb-core" }
treb-config = { path = "crates/treb-config" }
treb-registry = { path = "crates/treb-registry" }
treb-forge = { path = "crates/treb-forge" }

# Foundry — pinned to tag v1.5.1 (commit b0a9dd9ceda36f63e2326ce530c10e6916f4b8a2)
foundry-config = { git = "https://github.com/foundry-rs/foundry", tag = "v1.5.1" }
foundry-common = { git = "https://github.com/foundry-rs/foundry", tag = "v1.5.1" }
foundry-compilers = "0.19.14"
forge-script = { git = "https://github.com/foundry-rs/foundry", tag = "v1.5.1" }
forge-script-sequence = { git = "https://github.com/foundry-rs/foundry", tag = "v1.5.1" }
foundry-evm = { git = "https://github.com/foundry-rs/foundry", tag = "v1.5.1" }
foundry-cheatcodes = { git = "https://github.com/foundry-rs/foundry", tag = "v1.5.1" }

# Alloy — version aligned with foundry v1.5.1
alloy-primitives = "1.4.1"
alloy-json-abi = "0.8"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
chrono = { version = "0.4", features = ["serde"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Environment
dotenvy = "0.15"

# File locking
fs2 = "0.4"

# Testing
tempfile = "3"

# Error handling & async
thiserror = "2"
anyhow = "1"
eyre = "0.6"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

# Patch: svm-rs-builds >=0.5.22 fixes duplicate SOLC_VERSION_0_8_31 constants
# (see https://github.com/alloy-rs/svm-rs/pull/179)
[patch.crates-io]
svm-rs-builds = { git = "https://github.com/alloy-rs/svm-rs", tag = "v0.5.24" }

# Patch: solar crates must match foundry v1.5.1's pinned revision
solar = { package = "solar-compiler", git = "https://github.com/paradigmxyz/solar.git", rev = "1f28069" }
solar-interface = { package = "solar-interface", git = "https://github.com/paradigmxyz/solar.git", rev = "1f28069" }
solar-ast = { package = "solar-ast", git = "https://github.com/paradigmxyz/solar.git", rev = "1f28069" }
solar-sema = { package = "solar-sema", git = "https://github.com/paradigmxyz/solar.git", rev = "1f28069" }
