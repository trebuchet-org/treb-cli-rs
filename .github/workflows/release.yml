name: Release

on:
  workflow_run:
    workflows: ["Release Build"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-multiple: true
          path: dist/

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Gather build metadata
        id: meta
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import glob
          import sys
          from collections import defaultdict

          files = sorted(glob.glob("dist/*.build-metadata"))
          if not files:
              print("No build metadata artifacts found", file=sys.stderr)
              sys.exit(1)

          backends = defaultdict(dict)
          for path in files:
              data = {}
              with open(path, encoding="utf-8") as handle:
                  for line in handle:
                      line = line.rstrip("\n")
                      if "=" not in line:
                          continue
                      # Handle both cargo:rustc-env=KEY=VAL and KEY=VAL
                      if line.startswith("cargo:rustc-env="):
                          line = line[len("cargo:rustc-env="):]
                      key, value = line.split("=", 1)
                      data[key] = value
              backend = data.get("FOUNDRY_BACKEND", "unknown")
              backends[backend] = data

          # Build a table of backends
          rows = []
          for backend in sorted(backends):
              d = backends[backend]
              foundry = d.get("TREB_FOUNDRY_VERSION", "unknown")
              sol = d.get("TREB_SOL_COMMIT", "unknown")
              rust = d.get("TREB_RUST_VERSION", "unknown")
              rows.append(f"| {backend} | `{foundry}` | `{sol}` | `{rust}` |")

          table = "\n".join(rows)
          print(f"table<<EOF")
          print(table)
          print("EOF")
          PY

      - name: Consolidate checksums
        run: |
          cd dist
          cat *.sha256 | sort > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          BODY=$(cat <<EOF
          ## Build Info

          | Backend | Foundry | treb-sol | Rust |
          |---------|---------|----------|------|
          ${{ steps.meta.outputs.table }}
          EOF
          )

          PRERELEASE=""
          if [[ "$TAG" == nightly-* ]]; then
            PRERELEASE="--prerelease"
          fi

          gh release create "$TAG" \
            --title "treb $TAG" \
            --notes "$BODY" \
            --generate-notes \
            $PRERELEASE \
            dist/*.tar.gz dist/*.sha256 dist/checksums.txt
