name: Release

on:
  workflow_run:
    workflows: ["Release Build"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v') &&
      !contains(github.event.workflow_run.head_branch, 'nightly')
    runs-on: ubuntu-latest

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-multiple: true
          path: dist/

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Gather build metadata
        id: meta
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import glob
          import sys

          keys = {
              "TREB_FOUNDRY_VERSION": "foundry_version",
              "TREB_SOL_COMMIT": "treb_sol_commit",
              "TREB_RUST_VERSION": "rust_version",
          }

          files = sorted(glob.glob("dist/*.build-metadata"))
          if not files:
              print("No build metadata artifacts found", file=sys.stderr)
              sys.exit(1)

          values_by_key = {key: set() for key in keys}
          for path in files:
              data = {}
              with open(path, encoding="utf-8") as handle:
                  for line in handle:
                      line = line.rstrip("\n")
                      prefix = "cargo:rustc-env="
                      if not line.startswith(prefix):
                          continue
                      key, value = line[len(prefix):].split("=", 1)
                      data[key] = value
              for key in keys:
                  if key not in data:
                      print(f"Missing {key} in {path}", file=sys.stderr)
                      sys.exit(1)
                  values_by_key[key].add(data[key])

          for key, output_name in keys.items():
              values = sorted(values_by_key[key])
              if len(values) != 1:
                  print(f"Inconsistent {key} across build artifacts:", file=sys.stderr)
                  for value in values:
                      print(f"  {value}", file=sys.stderr)
                  sys.exit(1)
              value = values[0]
              print(f"{output_name}<<EOF")
              print(value)
              print("EOF")
          PY

      - name: Consolidate checksums
        run: |
          cd dist
          cat *.sha256 | sort > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          BODY=$(cat <<EOF
          ## Build Info

          | Field | Value |
          |-------|-------|
          | Foundry | \`${{ steps.meta.outputs.foundry_version }}\` |
          | treb-sol | \`${{ steps.meta.outputs.treb_sol_commit }}\` |
          | Rust | \`${{ steps.meta.outputs.rust_version }}\` |
          EOF
          )

          gh release create "$TAG" \
            --title "treb $TAG" \
            --notes "$BODY" \
            --generate-notes \
            dist/*.tar.gz dist/*.sha256 dist/checksums.txt
