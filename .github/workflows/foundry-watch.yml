name: Foundry Nightly Watch

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-update:
    name: Check for foundry nightly update
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check.outputs.updated }}
      tag: ${{ steps.check.outputs.tag }}
      foundry_tag: ${{ steps.check.outputs.foundry_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check for new foundry nightly
        id: check
        run: |
          # Get the commit hash the foundry nightly tag points to
          LATEST_HASH=$(curl -fsSL https://api.github.com/repos/foundry-rs/foundry/git/ref/tags/nightly \
            | jq -r '.object.sha // empty')

          if [ -z "$LATEST_HASH" ]; then
            echo "No foundry nightly tag found"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find current foundry tag in Cargo.toml
          CURRENT_TAG=$(grep -oP 'tag\s*=\s*"nightly-\K[^"]+' Cargo.toml | head -1 || echo "")

          if [ "$CURRENT_TAG" = "$LATEST_HASH" ]; then
            echo "Already on latest foundry nightly ($CURRENT_TAG)"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FOUNDRY_TAG="nightly-${LATEST_HASH}"
          FOUNDRY_SHORT="${LATEST_HASH:0:8}"
          TREB_SHORT="$(git rev-parse --short HEAD)"
          RELEASE_TAG="nightly-${TREB_SHORT}--foundry-nightly-${FOUNDRY_SHORT}"

          echo "New foundry nightly: $FOUNDRY_TAG"
          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "foundry_tag=${FOUNDRY_TAG}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@nightly
        if: steps.check.outputs.updated == 'true'

      - uses: foundry-rs/foundry-toolchain@v1
        if: steps.check.outputs.updated == 'true'

      - uses: mozilla-actions/sccache-action@v0.0.9
        if: steps.check.outputs.updated == 'true'
        continue-on-error: true
      - name: Configure sccache
        if: steps.check.outputs.updated == 'true'
        run: |
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          fi

      - name: Update Cargo.toml foundry dep
        if: steps.check.outputs.updated == 'true'
        run: |
          FOUNDRY_TAG="${{ steps.check.outputs.foundry_tag }}"
          # Update all foundry git dep tags in Cargo.toml
          sed -i "s|tag = \"nightly-[a-f0-9]*\"|tag = \"${FOUNDRY_TAG}\"|g" Cargo.toml

      - name: Test
        if: steps.check.outputs.updated == 'true'
        run: cargo test --workspace --all-targets

      - name: Commit, tag, and push
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump foundry to ${{ steps.check.outputs.foundry_tag }}"
          # Tag triggers release-build → release pipeline
          git tag "${{ steps.check.outputs.tag }}"
          git push origin main "${{ steps.check.outputs.tag }}"

      - name: Close old foundry-compat issues and open new one on failure
        if: failure() && steps.check.outputs.updated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.check.outputs.foundry_tag }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Foundry nightly ${tag} breaks treb tests`;

            // Close all existing foundry-compat issues (old nightlies superseded)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'foundry-compat',
              state: 'open',
            });
            for (const issue of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

            // Check if we already have an issue for this exact tag
            const dupes = existing.data.filter(i => i.title === title);
            if (dupes.length > 0) {
              core.info(`Issue already exists for ${tag}, skipping`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The foundry nightly watch detected a new foundry nightly that fails treb tests.\n\nFoundry tag: \`${tag}\`\nWorkflow run: ${runUrl}`,
              labels: ['foundry-compat']
            });

