name: Foundry Pin Builds

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Step 1: Update ci/foundry-stable-pins.toml with latest foundry tags
  # and commit to main if changed.
  update-targets:
    name: Update foundry targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      updated: ${{ steps.commit.outputs.updated }}
    steps:
      - uses: actions/checkout@v4

      - name: Run update script
        run: ci/update-foundry-targets.sh

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet ci/foundry-stable-pins.toml; then
            echo "No changes to foundry targets"
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add ci/foundry-stable-pins.toml
            git commit -m "chore: update foundry pin targets"
            git push origin main
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build matrix from targets
        id: discover
        run: |
          # Read [targets] section from pins file
          TARGETS=$(python3 -c "
          import re
          with open('ci/foundry-stable-pins.toml') as f: content = f.read()
          m = re.search(r'\[targets\]\n(.*?)(?=\n\[|\Z)', content, re.DOTALL)
          if m:
              for line in m.group(1).strip().splitlines():
                  key = line.split('=')[0].strip().strip('\"')
                  if key:
                      print(key)
          ")
          MATRIX=$(echo "$TARGETS" | jq -Rnc '[inputs | select(length > 0)]')
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Targets: $MATRIX"

  # Step 2: Test each foundry target
  test-pin:
    name: Test foundry ${{ matrix.foundry_tag }}
    needs: update-targets
    if: needs.update-targets.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        foundry_tag: ${{ fromJson(needs.update-targets.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # use latest (may include the target update commit)
          submodules: recursive

      - uses: dtolnay/rust-toolchain@nightly

      - uses: foundry-rs/foundry-toolchain@v1

      - uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true
      - name: Configure sccache
        run: |
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          fi

      - name: Apply foundry pin
        run: |
          FOUNDRY_TAG="${{ matrix.foundry_tag }}"

          # Replace foundry dep tags
          sed -i -E "s|tag = \"(nightly-[a-f0-9]+\|v[0-9][^\"]*)\"|tag = \"${FOUNDRY_TAG}\"|g" Cargo.toml

          # Remove existing [patch.crates-io]
          python3 -c "
          import re
          with open('Cargo.toml') as f: cargo = f.read()
          cargo = re.sub(r'\n\[patch\.crates-io\].*', '', cargo, flags=re.DOTALL)
          with open('Cargo.toml', 'w') as f: f.write(cargo)
          "

          # Apply version-specific patches
          python3 - "$FOUNDRY_TAG" <<'PY'
          import sys, re
          tag = sys.argv[1]
          try:
              with open("ci/foundry-stable-pins.toml") as f: pins = f.read()
          except FileNotFoundError:
              exit(0)
          pattern = rf'\[patches\."{re.escape(tag)}"\]\n(.*?)(?=\n\[|\Z)'
          m = re.search(pattern, pins, re.DOTALL)
          if not m: exit(0)
          entries = m.group(1).strip()
          if entries:
              with open("Cargo.toml", "a") as f:
                  f.write(f"\n[patch.crates-io]\n{entries}\n")
              print(f"Applied patches for {tag}")
          PY

          echo "--- foundry tag: $FOUNDRY_TAG ---"
          grep "foundry" Cargo.toml | head -3

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Set tag output
        id: tag
        if: success()
        run: |
          TREB_SHORT="$(git rev-parse --short HEAD)"
          echo "tag=nightly-${TREB_SHORT}--foundry-${{ matrix.foundry_tag }}" >> "$GITHUB_OUTPUT"

  # Step 3: Build releases for targets that passed tests
  # (only triggers if test-pin succeeded for all — use continue-on-error
  #  on test-pin if you want partial builds)
