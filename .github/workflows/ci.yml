name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true
      - name: Configure sccache
        run: |
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "sccache unavailable, building without cache"
          fi
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: taiki-e/install-action@nextest
      - name: Run tests (retry failed only)
        run: cargo nextest run --workspace --all-targets --retries 2

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true
      - name: Configure sccache
        run: |
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "sccache unavailable, building without cache"
          fi
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --check

  smoke:
    name: smoke test
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
      - uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true
      - name: Configure sccache
        run: |
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "sccache unavailable, building without cache"
          fi
      - name: Build binary
        run: cargo build --bin treb-cli
      - name: Validate version JSON
        run: |
          JSON=$(./target/debug/treb-cli version --json)
          echo "$JSON"
          echo "$JSON" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for field in ['version', 'commit', 'foundryVersion', 'trebSolCommit']:
              val = data.get(field, '')
              assert isinstance(val, str), f'{field} is not a string'
              assert val, f'{field} is empty'
              assert val != 'unknown', f'{field} is unknown'
          print('All metadata fields validated successfully')
          "
