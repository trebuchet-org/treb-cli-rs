name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release-build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            os_arch: linux-amd64
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            os_arch: linux-arm64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            os_arch: darwin-amd64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            os_arch: darwin-arm64
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Add target (macOS)
        if: matrix.use_cross == false
        run: rustup target add ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin treb-cli
          else
            cargo build --release --target ${{ matrix.target }} --bin treb-cli
          fi

      - name: Package
        shell: bash
        run: |
          ARCHIVE_NAME="treb-${{ github.ref_name }}-${{ matrix.os_arch }}"
          STAGING="staging-${ARCHIVE_NAME}"
          mkdir -p "${STAGING}/completions"
          cp "target/${{ matrix.target }}/release/treb-cli" "${STAGING}/treb"
          # Copy shell completions from build output
          COMP_DIR=$(find "target/${{ matrix.target }}/release/build" -path '*/treb-cli-*/out/completions' -type d 2>/dev/null | head -1)
          if [ -n "$COMP_DIR" ]; then
            cp "$COMP_DIR"/* "${STAGING}/completions/"
          fi
          tar czf "${ARCHIVE_NAME}.tar.gz" -C "${STAGING}" .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.sha256"
          else
            shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.sha256"
          fi
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_NAME }}.tar.gz
            ${{ env.ARCHIVE_NAME }}.sha256
