name: Release Build

on:
  push:
    tags:
      - 'v*'
      - 'nightly-*'
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (FQID)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  release-build:
    name: Build ${{ matrix.backend }} / ${{ matrix.os_arch }}
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: nightly
            feature: foundry-nightly
            manifest: ""
          - name: v1.6.0-rc1
            feature: foundry-v1-5-1
            manifest: backends/v1.6.0-rc1
          - name: v1.5.1
            feature: foundry-v1-5-1
            manifest: backends/v1.5.1
        platform:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            os_arch: linux-amd64
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            os_arch: linux-arm64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            os_arch: darwin-amd64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            os_arch: darwin-arm64
            use_cross: false
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@nightly

      - uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true
      - name: Configure sccache
        run: |
          if command -v sccache &>/dev/null && sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          fi

      - name: Install cross
        if: matrix.platform.use_cross
        run: cargo install cross --locked

      - name: Add target (macOS)
        if: matrix.platform.use_cross == false
        run: rustup target add ${{ matrix.platform.target }}

      - name: Swap manifest for backend
        if: matrix.backend.manifest != ''
        run: |
          cp "${{ matrix.backend.manifest }}/Cargo.toml" Cargo.toml
          cp "${{ matrix.backend.manifest }}/Cargo.lock" Cargo.lock

      - name: Build
        shell: bash
        run: |
          BUILD_CMD="cargo"
          if [ "${{ matrix.platform.use_cross }}" = "true" ]; then
            BUILD_CMD="cross"
          fi
          $BUILD_CMD build --release \
            --target ${{ matrix.platform.target }} \
            --bin treb-cli \
            --no-default-features \
            --features ${{ matrix.backend.feature }}

      - name: Restore manifest
        if: matrix.backend.manifest != ''
        run: git checkout Cargo.toml Cargo.lock

      - name: Package
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          ARCHIVE_NAME="treb-${TAG}+foundry-${{ matrix.backend.name }}-${{ matrix.platform.os_arch }}"
          STAGING="staging-${ARCHIVE_NAME}"
          TARGET_DIR="target/${{ matrix.platform.target }}/release/build"
          mkdir -p "${STAGING}/completions"
          cp "target/${{ matrix.platform.target }}/release/treb-cli" "${STAGING}/treb"
          export TARGET_DIR
          BUILD_DIR=$(python3 - <<'PY'
          import glob
          import os
          import sys

          target_dir = os.environ["TARGET_DIR"]
          matches = glob.glob(os.path.join(target_dir, "treb-cli-*/output"))
          if not matches:
              sys.exit("treb-cli build metadata output not found")
          print(os.path.dirname(max(matches, key=os.path.getmtime)))
          PY
          )
          BUILD_OUTPUT="${BUILD_DIR}/output"
          COMP_DIR="${BUILD_DIR}/out/completions"
          if [ -d "$COMP_DIR" ]; then
            find "$COMP_DIR" -maxdepth 1 -type f -exec cp {} "${STAGING}/completions/" \;
          fi
          tar czf "${ARCHIVE_NAME}.tar.gz" -C "${STAGING}" .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.sha256"
          else
            shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.sha256"
          fi
          {
            grep '^cargo:rustc-env=TREB_FOUNDRY_VERSION=' "$BUILD_OUTPUT"
            grep '^cargo:rustc-env=TREB_SOL_COMMIT=' "$BUILD_OUTPUT"
            grep '^cargo:rustc-env=TREB_RUST_VERSION=' "$BUILD_OUTPUT"
            echo "FOUNDRY_BACKEND=${{ matrix.backend.name }}"
          } > "${ARCHIVE_NAME}.build-metadata"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_NAME }}.tar.gz
            ${{ env.ARCHIVE_NAME }}.sha256
            ${{ env.ARCHIVE_NAME }}.build-metadata
