name: Foundry Version Tracker

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read pinned version
        id: pinned
        run: echo "tag=$(cat .foundry-pin | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Get latest foundry release
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release view --repo foundry-rs/foundry --json tagName -q .tagName)
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Check if up to date
        id: check
        run: |
          PINNED="${{ steps.pinned.outputs.tag }}"
          LATEST="${{ steps.latest.outputs.tag }}"
          echo "Pinned: $PINNED  |  Latest: $LATEST"
          if [ "$PINNED" = "$LATEST" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Already at latest foundry release ($PINNED). Nothing to do."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "New foundry release detected: $PINNED -> $LATEST"
          fi

      - name: Configure git
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create bump branch and update pins
        if: steps.check.outputs.up_to_date == 'false'
        id: branch
        run: |
          OLD_TAG="${{ steps.pinned.outputs.tag }}"
          NEW_TAG="${{ steps.latest.outputs.tag }}"
          BRANCH="foundry-bump/$NEW_TAG"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

          git checkout -b "$BRANCH"

          # Replace all foundry tag references in Cargo.toml
          sed -i "s|tag = \"$OLD_TAG\"|tag = \"$NEW_TAG\"|g" Cargo.toml

          # Update the pinned version file
          printf '%s\n' "$NEW_TAG" > .foundry-pin

          git add Cargo.toml .foundry-pin
          git commit -m "chore: bump foundry pin from $OLD_TAG to $NEW_TAG"
          git push origin "$BRANCH"

      - name: Set up Rust toolchain
        if: steps.check.outputs.up_to_date == 'false'
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust build artifacts
        if: steps.check.outputs.up_to_date == 'false'
        uses: Swatinem/rust-cache@v2

      - name: Run cargo check
        if: steps.check.outputs.up_to_date == 'false'
        id: cargo_check
        shell: bash
        run: |
          set -o pipefail
          cargo check --workspace 2>&1 | tee /tmp/cargo-check.log
        continue-on-error: true

      - name: Run cargo test
        if: steps.check.outputs.up_to_date == 'false'
        id: cargo_test
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace 2>&1 | tee /tmp/cargo-test.log
        continue-on-error: true

      - name: Evaluate build status
        if: steps.check.outputs.up_to_date == 'false'
        id: status
        run: |
          CHECK="${{ steps.cargo_check.outcome }}"
          TEST="${{ steps.cargo_test.outcome }}"
          echo "cargo check: $CHECK  |  cargo test: $TEST"
          if [ "$CHECK" = "success" ] && [ "$TEST" = "success" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on build failure
        if: steps.check.outputs.up_to_date == 'false' && steps.status.outputs.success == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.latest.outputs.tag }}"
          OLD_TAG="${{ steps.pinned.outputs.tag }}"
          TITLE="foundry bump $NEW_TAG: build failure"

          # Duplicate detection: skip if a matching open issue already exists
          EXISTING=$(gh issue list --search "$TITLE in:title" --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Open issue #$EXISTING already exists for '$TITLE'. Skipping creation."
            exit 0
          fi

          # Truncate logs to stay within GitHub body size limits (~65 KB)
          CHECK_LOG=$(head -c 8000 /tmp/cargo-check.log 2>/dev/null || echo "(no output captured)")
          TEST_LOG=$(head -c 8000 /tmp/cargo-test.log 2>/dev/null || echo "(no output captured)")

          gh issue create \
            --title "$TITLE" \
            --body "## Foundry Bump Build Failure

Attempted to bump foundry from \`$OLD_TAG\` to \`$NEW_TAG\` on branch \`foundry-bump/$NEW_TAG\` but CI checks failed.

**Workflow run:** $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID

### \`cargo check\` — outcome: \`${{ steps.cargo_check.outcome }}\`

\`\`\`
$CHECK_LOG
\`\`\`

### \`cargo test\` — outcome: \`${{ steps.cargo_test.outcome }}\`

\`\`\`
$TEST_LOG
\`\`\`

Please investigate the breaking changes in foundry \`$NEW_TAG\` and update the codebase manually on the bump branch."

      - name: Open PR and enable auto-merge on success
        if: steps.check.outputs.up_to_date == 'false' && steps.status.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.latest.outputs.tag }}"
          OLD_TAG="${{ steps.pinned.outputs.tag }}"
          BRANCH="${{ steps.branch.outputs.name }}"

          PR_URL=$(gh pr create \
            --title "chore: bump foundry pin to $NEW_TAG" \
            --body "Automated foundry version bump from \`$OLD_TAG\` to \`$NEW_TAG\`.

All CI checks passed on branch \`$BRANCH\`.

**Workflow run:** $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --head "$BRANCH" \
            --base main)

          echo "PR created: $PR_URL"
          gh pr merge --auto --squash "$PR_URL"
